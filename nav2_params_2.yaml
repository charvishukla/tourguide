amcl:
  ros__parameters:
    use_sim_time: False

bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    default_bt_xml_filename: "/opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    transform_tolerance: 0.5
    action_server_result_timeout: 10.0

planner_server:
  ros__parameters:
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"

controller_server:
  ros__parameters:
    use_sim_time: False
    odom_topic: "/odometry/filtered"
    controller_frequency: 10.0
    controller_plugins: ["FollowPath"]
    enable_stamped_cmd_vel: True
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      min_vel_x: 0.0
      max_vel_x: 0.4
      max_vel_theta: 0.8
      min_speed_xy: 0.0
      max_speed_xy: 0.4
      accel_lim_x: 2.5
      accel_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_theta: -3.2
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

behavior_server:
  ros__parameters:
    use_sim_time: False
    local_frame: odom
    enable_stamped_cmd_vel: True
    global_frame: map
    robot_base_frame: base_link
    behaviors: ["spin", "backup"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"


smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    enable_stamped_cmd_vel: True

opennav_docking:
  ros__parameters:
    use_sim_time: False
    enable_stamped_cmd_vel: True
    controller_frequency: 20.0
    dock_plugins: ["simple_dock"]
    simple_dock:
      plugin: "opennav_docking::SimpleChargingDock"


docking_server:
  ros__parameters:
    use_sim_time: False
    enable_stamped_cmd_vel: True
    controller_frequency: 20.0
    dock_plugins: ["simple_dock"]
    simple_dock:
      plugin: "opennav_docking::SimpleChargingDock"

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      transform_tolerance: 0.5
      resolution: 0.05
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan
        scan: {topic: /scan, data_type: "LaserScan", marking: True, clearing: True}
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.35

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      transform_tolerance: 0.5
      global_frame: map
      robot_base_frame: base_link
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: "/rtabmap/map"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.35


collision_monitor:
  ros__parameters:
    use_sim_time: False
    enable_stamped_cmd_vel: True
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    transform_tolerance: 0.1
    source_timeout: 5.0
    stop_pub_timeout: 2.0
    autostart: False
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
    polygons: ["Stop"]
    Stop:
      type: "circle"
      radius: 0.25
      action_type: "none"


collision_monitor:
  ros__parameters:
    use_sim_time: False
    enable_stamped_cmd_vel: True
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    transform_tolerance: 0.1
    source_timeout: 5.0
    stop_pub_timeout: 2.0
    autostart: False
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
    polygons: ["PolygonStop"]
    PolygonStop:
      type: "circle"
      radius: 0.25
      action_type: "none"


waypoint_follower:
  ros__parameters:
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 0
