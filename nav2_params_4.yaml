# bt navigator is at the top level 
bt_navigator:
  ros__parameters:
    use_sim_time: false      # since we are not using a simulation
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 100
    default_server_timeout: 10000
    wait_for_service_timeout: 10000
    enable_stamped_cmd_vel: true  # added this line !!!
    default_nav_to_pose_bt_xml: "$(find-pkg-share nav2_bt_navigator)/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    navigators: ["navigate_to_pose"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    error_code_name_prefixes:
      - assisted_teleop
      - backup
      - compute_path
      - dock_robot
      - drive_on_heading
      - follow_path
      - nav_thru_poses
      - nav_to_pose
      - route
      - spin
      - undock_robot
      - wait

controller_server:
  ros__parameters:
    controller_frequency: 5.0
    costmap_update_timeout: 1.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 5.0        # reducing failure tolerance to 3 seconds to make it wait around less!
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    odom_topic: /odometry/filtered
    enable_stamped_cmd_vel: true # changed
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 10.0                # tell the progress checker to wait x amount of time before replanning (i think) 
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05
      yaw_goal_tolerance: 0.50
      path_length_tolerance: 0.75
      stateful: false
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"    # Back to purely DWB!
      debug_trajectory_details: true
      # min_vel_x: 0.0                       # Keeping reverse so it doesn't get permanently trapped
      max_vel_x: 0.30
      min_vel_x: 0.0
      max_vel_y: 0.0
      min_vel_y: 0.0
      max_vel_theta: 1.5
      min_vel_theta: -1.5 # allow rigth turns 
      min_speed_theta: 0.0
      min_speed_xy: 0.05 #0.0
      max_speed_xy: 0.5
      acc_lim_x: 2.5
      acc_lim_y: 0.0
      acc_lim_theta: 2.5
      decel_lim_x: -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -2.5
      vx_samples: 20
      vy_samples: 1
      vtheta_samples: 20
      sim_time: 2.0
      linear_granularity: 0.1
      angular_granularity: 0.05
      xy_goal_tolerance: 0.10
      path_length_tolerance: 1.0
      trans_stopped_velocity: 0.01
      short_circuit_trajectory_evaluation: true
      limit_vel_cmd_in_traj: true
      stateful: true
      critics: ["RotateToGoal", "ObstacleFootprint", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      # RotateToGoal:
      #   xy_goal_tolerance: 0.10
      #   path_length_tolerance: 0.5
      #   trans_stopped_velocity: 0.01
      # GoalAlign.forward_point_distance: 0.325
      # PathAlign.forward_point_distance: 0.325      
      # ObstacleFootprint.scale: 12.0
      # PathAlign.scale: 12.0        # High value = strict alignment to the path
      # PathDist.scale: 12.0         # High value = strictly stay on the path
      # GoalAlign.scale: 8.0
      # GoalDist.scale: 8.0
      RotateToGoal:
        xy_goal_tolerance: 0.10
        path_length_tolerance: 0.5
        trans_stopped_velocity: 0.01
      GoalAlign.forward_point_distance: 0.325
      PathAlign.forward_point_distance: 0.325      
      ObstacleFootprint.scale: 12.0
      PathAlign.scale: 4.0        # MASSIVE increase: Force strict alignment to the path
      PathDist.scale: 8.0         # MASSIVE increase: Force it to physically stay on the line
      GoalAlign.scale: 12.0
      GoalDist.scale: 4.0



planner_server:
  ros__parameters:
    allow_partial_planning: false # was false before
    expected_planner_frequency: 1.0
    costmap_update_timeout: 3.0
    introspection_mode: "disabled"
    enable_stamped_cmd_vel: true # added this line !!!
    planner_plugins: ['GridBased']
    GridBased:
      plugin: 'nav2_smac_planner::SmacPlanner2D'       #'nav2_navfn_planner::NavfnPlanner'
      tolerance: 0.5 #######
      allow_unknown: true


behavior_server:
  ros__parameters:
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 1.0
    simulate_ahead_time: 1.0
    max_rotational_vel: 0.8
    min_rotational_vel: 0.01
    rotational_acc_lim: 2.2
    enable_stamped_cmd_vel: true
    local_costmap_topic: /local_costmap/costmap_raw
    global_costmap_topic: /global_costmap/costmap_raw
    local_footprint_topic: /local_costmap/published_footprint
    global_footprint_topic: /global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"] # may need to change default params for each
    spin:
      plugin: "nav2_behaviors::Spin"
      enable_stamped_cmd_vel: true
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"



global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 5.0      #1.0
      transform_tolerance: 1.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.35
      resolution: 0.1
      track_unknown_space: true
      enable_stamped_cmd_vel: true # added this line !!!
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan # added a scan
        footprint_clearing_enabled: true
        max_obstacle_height: 2.0
        min_obstacle_height: 0.0
        combination_method: 1
        scan: # can try /rtabmap/map's point cloud topic here
          topic: /scan_filtered
          obstacle_max_range: 5.0
          obstacle_min_range: 0.0
          raytrace_max_range: 5.5        #3.0
          raytrace_min_range: 0.1
          clearing: true
          marking: true
          data_type: "LaserScan"
          inf_is_valid: false
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        # map_topic: "/rtabmap/map"
        map_subscribe_transient_local: true
        enabled: true
        subscribe_to_updates: false # was true
      inflation_layer: # could be very compute intensive.   ???
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.55 # was 0.40
        cost_scaling_factor: 10.0 # was 10.0
        inflate_unknown: true
        inflate_around_unknown: true
        inflate_around_unknown: true
      always_send_full_costmap: true


local_costmap:
  local_costmap:
    ros__parameters:
      global_frame: odom
      robot_base_frame: base_link
      robot_radius: 0.35
      update_frequency: 5.0
      publish_frequency: 2.0
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      introspection_mode: "disabled"
      enable_stamped_cmd_vel: true # added this line !!!
      plugins: ["inflation_layer", "obstacle_layer"]
      inflation_layer: # could be very compute intensive.   ???
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.65
        inflate_unknown: true
        inflate_around_unknown: true
        cost_scaling_factor: 5.0
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        footprint_clearing_enabled: true
        max_obstacle_height: 2.0
        min_obstacle_height: 0.0
        combination_method: 1
        scan: # can try /rtabmap/map's point cloud topic here
          topic: /scan_filtered
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0
          raytrace_max_range: 5.5        #3.0
          raytrace_min_range: 0.01
          clearing: true
          marking: true
          data_type: "LaserScan"
          inf_is_valid: false


collision_monitor:
  ros__parameters:
    enabled: true
    frequency: 5.0
    enable_stamped_cmd_vel: true
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    # cmd_vel_in_topic: "cmd_vel_nav"
    # cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state" # uhhh does this exist?
    transform_tolerance: 1.0
    observation_sources: ['scan'] # REQUIRED ARGUMENT
    # Polygons represent zone around the robot for "stop", "slowdown" and "limit" action types,
    polygons: ["FootprintApproach", "PolygonStop"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 0.5 
      simulation_time_step: 0.5
      min_points: 6
      enabled: true
    PolygonStop:
      type: "polygon" # "circle"
      points: "[[0.25, 0.25], [0.25, -0.25], [0.0, -0.25], [0.0, 0.25]]" #  "[[0.15, 0.15], [0.15, -0.15], [0.0, -0.15], [0.0, 0.15]]"
      # radius: 0.45 # 0.55
      action_type: "stop"
      min_points: 3
      polygon_pub_topic: "polygon_stop"
      enabled: True
    scan:
      topic: /scan_filtered
      obstacle_max_range: 2.0
      obstacle_min_range: 0.0
      raytrace_max_range: 3.0
      raytrace_min_range: 0.1
      clearing: true
      marking: true
      data_type: "LaserScan"
      inf_is_valid: false



# I guess it really wants a charging dock: [opennav_docking-10] [ERROR] [1772744967.482321963] [docking_server]: Charging dock plugins not given!
# so adding this 
docking_server:
  ros__parameters:
    enable_stamped_cmd_vel: True
    dock_plugins: ['dummy_dock']
    dummy_dock:
      plugin: 'opennav_docking::SimpleChargingDock'
      use_battery_status: false

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 5.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 1.5]
    min_velocity: [-0.5, 0.0, -1.5]
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
    max_accel: [0.5, 0.0, 1.0]
    max_decel: [-0.5, 0.0, -1.0]
    odom_topic: /odom/filtered
    odom_duration: 0.5
    use_realtime_priority: false
    enable_stamped_cmd_vel: true
    stamp_smoothed_velocity_with_smoothing_time: false  # ONLY IN JAZZY


waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    introspection_mode: "disabled"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 2
